services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-studentski-db.sql:/docker-entrypoint-initdb.d/02-init-studentski.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Web: http://localhost:5050 — u pgAdmin: Add Server → Host: postgres, Port: 5432, User: app, Password: app
  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      JWT_SECRET: ${JWT_SECRET:-mikroservisni-jwt-tajni-kljuc-mora-biti-dovoljno-dug-za-hs256-algoritam-bezbednosti}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-studentski-s2s-internal-token-promeni-u-produkciji}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://127.0.0.1:8081/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 18
      start_period: 120s

  studentski-api:
    build: ./services/studentski-api
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studentski_db
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      JWT_SECRET: ${JWT_SECRET:-mikroservisni-jwt-tajni-kljuc-mora-biti-dovoljno-dug-za-hs256-algoritam-bezbednosti}
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-studentski-s2s-internal-token-promeni-u-produkciji}
    # 8080 na hostu često je zauzet — direktan pristup API-ju: http://localhost:18080
    ports:
      - "${STUDENTSKI_API_HOST_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  gateway:
    build: ./infra/nginx
    ports:
      - "8088:80"
    depends_on:
      auth-service:
        condition: service_healthy
      studentski-api:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
