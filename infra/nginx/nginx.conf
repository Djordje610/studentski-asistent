events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Spring Boot prvih sekundi može sporije odgovarati; izbegni prerano 502
    proxy_connect_timeout 75s;
    proxy_send_timeout    75s;
    proxy_read_timeout    75s;

    upstream auth_upstream {
        server auth-service:8081;
    }

    upstream api_upstream {
        server studentski-api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Interni servis-servis putevi ne smeju biti dostupni kroz javni gateway
        location /auth/internal {
            return 404;
        }

        location /auth/ {
            proxy_pass http://auth_upstream/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator/ {
            proxy_pass http://api_upstream/actuator/;
        }
    }
}
